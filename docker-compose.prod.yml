# Production Docker Compose configuration for OpenDismissal
# Use this for production deployments with proper security and performance settings
version: '3.8'

services:
  # PostgreSQL Database - Production Configuration
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opendismissal}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - opendismissal
    # Security: Don't expose database port to host in production
    # Use internal network communication only

  # Redis for caching and sessions - Production Configuration
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - opendismissal
    # Security: Don't expose Redis port to host in production

  # Django Application - Production Configuration
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opendismissal}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - TIME_ZONE=${TIME_ZONE:-America/New_York}
      - DJANGO_LOG_LEVEL=${DJANGO_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Production logging - use Docker logging drivers in real production
      - app_logs:/app/logs
      - app_static:/app/staticfiles
      - app_media:/app/media
    networks:
      - opendismissal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    # Security and performance limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Log configuration for production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy (optional, for production with SSL termination)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - app_static:/var/www/static:ro
      - app_media:/var/www/media:ro
    depends_on:
      - web
    networks:
      - opendismissal
    # Uncomment for SSL certificate renewal
    # - ./certbot/conf:/etc/letsencrypt
    # - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_static:
    driver: local
  app_media:
    driver: local

networks:
  opendismissal:
    driver: bridge