name: Security & Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:
  security-audit:
    name: Weekly Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        
    - name: Install dependencies
      run: |
        uv sync
        
    - name: Run comprehensive security audit
      run: |
        # Check for known vulnerabilities
        uv run safety check --json --output safety-report.json || true
        
        # Security linting
        uv run bandit -r dissmissal/ opendiss/ -f json -o bandit-report.json || true
        
    - name: Create security report
      run: |
        echo "# Security Audit Report - $(date)" > security-report.md
        echo "" >> security-report.md
        
        if [ -f safety-report.json ]; then
          echo "## Safety Check Results" >> security-report.md
          echo '```json' >> security-report.md
          cat safety-report.json >> security-report.md
          echo '```' >> security-report.md
          echo "" >> security-report.md
        fi
        
        if [ -f bandit-report.json ]; then
          echo "## Bandit Security Scan Results" >> security-report.md
          echo '```json' >> security-report.md
          cat bandit-report.json >> security-report.md
          echo '```' >> security-report.md
        fi
        
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-$(date +%Y%m%d)
        path: |
          safety-report.json
          bandit-report.json
          security-report.md
        retention-days: 90

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        
    - name: Check for dependency updates
      run: |
        # Generate dependency tree
        uv tree > dependency-tree.txt
        
        # Check for outdated packages
        uv sync --upgrade-package '*' --dry-run > update-preview.txt || true
        
    - name: Create dependency report
      run: |
        echo "# Dependency Report - $(date)" > dependency-report.md
        echo "" >> dependency-report.md
        
        echo "## Current Dependency Tree" >> dependency-report.md
        echo '```' >> dependency-report.md
        cat dependency-tree.txt >> dependency-report.md
        echo '```' >> dependency-report.md
        echo "" >> dependency-report.md
        
        echo "## Available Updates" >> dependency-report.md
        echo '```' >> dependency-report.md
        cat update-preview.txt >> dependency-report.md
        echo '```' >> dependency-report.md
        
    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report-$(date +%Y%m%d)
        path: |
          dependency-tree.txt
          update-preview.txt
          dependency-report.md
        retention-days: 30
