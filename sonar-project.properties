# SonarQube Project Configuration for OpenDismissal
# This file configures SonarQube analysis for the Django-based school dismissal management system

# Project identification
sonar.projectKey=opendismissal
sonar.projectName=OpenDismissal
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=dissmissal,opendiss,manage.py
sonar.tests=dissmissal/tests

# Exclude generated and collected static files to avoid duplication issues
# The staticfiles folder contains copies of files from dissmissal/static/ created by Django's collectstatic
sonar.exclusions=**/staticfiles/**,**/migrations/**,**/__pycache__/**,**/logs/**,**/plans/**,**/venv/**,**/env/**,**/.pytest_cache/**,**/node_modules/**

# Include only relevant file types
sonar.inclusions=**/*.py,**/*.js,**/*.css,**/*.html

# Language-specific settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Django-specific exclusions for generated files
sonar.coverage.exclusions=**/migrations/**,**/settings.py,**/test_settings.py,**/manage.py,**/wsgi.py,**/asgi.py