apiVersion: v1
kind: Secret
metadata:
  name: opendismissal-secrets
type: Opaque
stringData:
  # Database connection string for PostgreSQL
  # Example: postgresql://username:password@hostname:5432/database_name
  database-url: "postgresql://user:pass@postgres-service:5432/opendismissal"
  
  # Django secret key - generate with: python -c 'from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())'
  secret-key: "your-django-secret-key-here"
  
  # Redis connection string
  # Example: redis://redis-service:6379/0
  redis-url: "redis://redis-service:6379/0"

---
apiVersion: v1
kind: Secret
metadata:
  name: docr-secret
type: kubernetes.io/dockerconfigjson
data:
  # Generate this with: doctl registry docker-config | base64 -w 0
  .dockerconfigjson: ""

---
# Example PostgreSQL deployment (for development - use managed database in production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: opendismissal
        - name: POSTGRES_USER
          value: opendismissal
        - name: POSTGRES_PASSWORD
          value: opendismissal_password  # Change this in production
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# Redis deployment for sessions and caching
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379