apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-data-sa
  namespace: opendismissal-demo
  labels:
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/component: demo-data
    app.kubernetes.io/part-of: opendismissal-demo
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-data-role
  namespace: opendismissal-demo
  labels:
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/component: demo-data
    app.kubernetes.io/part-of: opendismissal-demo
rules: []  # No Kubernetes API permissions needed for this job
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-data-rolebinding
  namespace: opendismissal-demo
  labels:
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/component: demo-data
    app.kubernetes.io/part-of: opendismissal-demo
subjects:
- kind: ServiceAccount
  name: demo-data-sa
  namespace: opendismissal-demo
roleRef:
  kind: Role
  name: demo-data-role
  apiGroup: rbac.authorization.k8s.io