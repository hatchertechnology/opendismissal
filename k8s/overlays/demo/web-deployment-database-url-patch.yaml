apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
spec:
  template:
    spec:
      containers:
      - name: django
        env:
        # Override the DATABASE_URL to use the properly encoded one from secret
        - name: DATABASE_URL
          $patch: replace
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: DATABASE_URL