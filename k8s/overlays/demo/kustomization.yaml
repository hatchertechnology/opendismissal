apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opendismissal-demo

resources:
- ../../base
- configmap.yaml
- secret.yaml
- ingress.yaml
- cert-manager-issuers.yaml
- external-dns-secret.yaml
- external-dns-rbac.yaml
- external-dns-deployment.yaml
- migration-job.yaml
- create-superuser-job.yaml
- generate-demo-data-job.yaml
- demo-data-rbac.yaml

namePrefix: ""
nameSuffix: "-demo"

patches:
- target:
    kind: Namespace
    name: opendismissal
  patch: |-
    - op: replace
      path: /metadata/name
      value: opendismissal-demo
    - op: add
      path: /metadata/labels/environment
      value: demo

commonLabels:
  app.kubernetes.io/part-of: opendismissal-demo
  environment: demo