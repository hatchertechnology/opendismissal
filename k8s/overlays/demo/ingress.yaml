apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-ingress
  namespace: opendismissal-demo
  labels:
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: opendismissal-demo
  annotations:
    # SSL/TLS configuration - using Let's Encrypt production issuer
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Using production for valid certificate
    
    # HTTPS redirection - enabled for security
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Proxy settings for Django
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    
    # Rate limiting for security
    nginx.ingress.kubernetes.io/rate-limit-requests-per-second: "10"
    nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "5"
spec:
  ingressClassName: nginx
  # TLS configuration with Let's Encrypt certificate
  tls:
  - hosts:
    - dismiss.hatchertechnology.com
    secretName: django-tls-cert
  rules:
  - host: dismiss.hatchertechnology.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: django-service-demo
            port:
              number: 80