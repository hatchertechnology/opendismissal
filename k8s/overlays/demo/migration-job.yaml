apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  namespace: opendismissal-demo
  labels:
    app: django-migrate
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: migration-job
    app.kubernetes.io/part-of: opendismissal-demo
spec:
  template:
    metadata:
      labels:
        app: django-migrate
        app.kubernetes.io/name: opendismissal
        app.kubernetes.io/component: migration-job
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until PGPASSWORD=$POSTGRES_PASSWORD pg_isready -h postgresql-service-demo -p 5432 -U $POSTGRES_USER; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 5
          done
          echo "PostgreSQL is ready!"
        env:
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: POSTGRES_PASSWORD
      containers:
      - name: django-migrate
        image: ghcr.io/hatchertechnology/opendismissal:latest
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          echo "Starting Django migrations..."
          uv run python manage.py migrate --noinput
          echo "Migrations completed successfully!"
        env:
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: DEBUG
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: SECRET_KEY
        - name: ALLOWED_HOSTS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: ALLOWED_HOSTS
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_PORT
        - name: POSTGRES_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_SSLMODE
        - name: TIME_ZONE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: TIME_ZONE
        - name: USE_TZ
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: USE_TZ
        # DATABASE_URL from secret with properly encoded password
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
  backoffLimit: 3
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 600  # 10 minutes timeout
  ttlSecondsAfterFinished: 3600  # Clean up job after 1 hour