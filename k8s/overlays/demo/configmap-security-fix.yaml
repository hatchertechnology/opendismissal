apiVersion: v1
kind: ConfigMap
metadata:
  name: django-config
  namespace: opendismissal-demo
  labels:
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: configmap
    app.kubernetes.io/part-of: opendismissal-demo
data:
  # Database connection parameters (non-sensitive)
  POSTGRES_DB: "opendismissal"
  POSTGRES_USER: "django_user"
  POSTGRES_HOST: "postgresql-service-demo"
  POSTGRES_PORT: "5432"
  
  # Application settings
  ALLOWED_HOSTS: "dismiss.hatchertechnology.com,localhost,127.0.0.1,.dismiss.hatchertechnology.com,10.109.*"
  DEBUG: "False"
  TIME_ZONE: "America/New_York"
  USE_TZ: "True"
  
  # Session configuration (database-backed, no Redis)
  SESSION_ENGINE: "django.contrib.sessions.backends.db"
  SESSION_COOKIE_AGE: "3600"  # Reduced to 1 hour for school security
  SESSION_COOKIE_SECURE: "True"
  SESSION_COOKIE_HTTPONLY: "True"
  SESSION_COOKIE_SAMESITE: "Lax"
  SESSION_EXPIRE_AT_BROWSER_CLOSE: "True"
  
  # Static files configuration with WhiteNoise
  STATIC_URL: "/static/"
  STATIC_ROOT: "staticfiles/"
  STATICFILES_STORAGE: "whitenoise.storage.CompressedManifestStaticFilesStorage"
  
  # Security settings
  SECURE_BROWSER_XSS_FILTER: "True"
  SECURE_CONTENT_TYPE_NOSNIFF: "True"
  SECURE_HSTS_SECONDS: "31536000"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
  SECURE_HSTS_PRELOAD: "True"
  SECURE_SSL_REDIRECT: "True"
  SECURE_PROXY_SSL_HEADER: "HTTP_X_FORWARDED_PROTO,https"
  X_FRAME_OPTIONS: "DENY"
  SECURE_REFERRER_POLICY: "strict-origin-when-cross-origin"
  
  # Cross-Origin Policies (fixes COOP errors)
  SECURE_CROSS_ORIGIN_OPENER_POLICY: "same-origin"
  
  # CSRF settings
  CSRF_COOKIE_SECURE: "True"
  CSRF_COOKIE_HTTPONLY: "True"
  CSRF_COOKIE_SAMESITE: "Lax"
  CSRF_TRUSTED_ORIGINS: "https://dismiss.hatchertechnology.com"
  CSRF_USE_SESSIONS: "True"
  
  # Database SSL configuration - REQUIRED for production
  POSTGRES_SSLMODE: "require"
  
  # Session performance optimization
  SESSION_SAVE_EVERY_REQUEST: "False"
  
  # CSP Configuration - Secure production settings
  # Note: These would be used if django-csp is installed
  CSP_DEFAULT_SRC: "'self'"
  # Script nonces should be generated per-request for inline scripts
  CSP_SCRIPT_SRC: "'self'"
  # Style nonces should be generated per-request for inline styles  
  CSP_STYLE_SRC: "'self'"
  CSP_IMG_SRC: "'self' data:"
  CSP_FONT_SRC: "'self'"
  CSP_CONNECT_SRC: "'self' wss: https://dismiss.hatchertechnology.com"
  CSP_FRAME_ANCESTORS: "'none'"
  CSP_BASE_URI: "'self'"
  CSP_FORM_ACTION: "'self'"
  CSP_UPGRADE_INSECURE_REQUESTS: "True"
  
  # Additional security settings
  DATA_UPLOAD_MAX_MEMORY_SIZE: "5242880"  # 5MB max upload