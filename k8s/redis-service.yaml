apiVersion: v1
kind: Service
metadata:
  name: redis-service-demo
  namespace: opendismissal-demo
  labels:
    app: redis
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: cache-service
    app.kubernetes.io/part-of: opendismissal-demo
    environment: demo
spec:
  selector:
    app: redis
    app.kubernetes.io/part-of: opendismissal-demo
    environment: demo
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP