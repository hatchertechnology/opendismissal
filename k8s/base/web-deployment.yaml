apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
  namespace: opendismissal
  labels:
    app: django
    app.kubernetes.io/name: opendismissal
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: web-application
    app.kubernetes.io/part-of: opendismissal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
        app.kubernetes.io/name: opendismissal
        app.kubernetes.io/component: web-application
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-db
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          echo "Waiting for database to be ready and migrations to complete..."
          until PGPASSWORD=$POSTGRES_PASSWORD pg_isready -h postgresql-service -p 5432 -U $POSTGRES_USER; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 5
          done
          echo "Database is ready! Django app can start."
        env:
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: POSTGRES_PASSWORD
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      containers:
      - name: django
        image: ghcr.io/hatchertechnology/opendismissal:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: DEBUG
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: SECRET_KEY
        - name: ALLOWED_HOSTS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: ALLOWED_HOSTS
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_PORT
        - name: POSTGRES_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: POSTGRES_SSLMODE
        # DATABASE_URL is set in environment overlays to handle special characters properly
        - name: TIME_ZONE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: TIME_ZONE
        - name: USE_TZ
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: USE_TZ
        - name: SESSION_ENGINE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SESSION_ENGINE
        - name: SESSION_COOKIE_AGE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SESSION_COOKIE_AGE
        - name: SESSION_COOKIE_SECURE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SESSION_COOKIE_SECURE
        - name: SESSION_COOKIE_HTTPONLY
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SESSION_COOKIE_HTTPONLY
        - name: SESSION_COOKIE_SAMESITE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SESSION_COOKIE_SAMESITE
        - name: SESSION_SAVE_EVERY_REQUEST
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SESSION_SAVE_EVERY_REQUEST
        - name: STATIC_URL
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: STATIC_URL
        - name: STATIC_ROOT
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: STATIC_ROOT
        - name: STATICFILES_STORAGE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: STATICFILES_STORAGE
        - name: SECURE_BROWSER_XSS_FILTER
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_BROWSER_XSS_FILTER
        - name: SECURE_CONTENT_TYPE_NOSNIFF
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_CONTENT_TYPE_NOSNIFF
        - name: SECURE_HSTS_SECONDS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_HSTS_SECONDS
        - name: SECURE_HSTS_INCLUDE_SUBDOMAINS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        - name: SECURE_HSTS_PRELOAD
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_HSTS_PRELOAD
        - name: SECURE_SSL_REDIRECT
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_SSL_REDIRECT
        - name: SECURE_PROXY_SSL_HEADER
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_PROXY_SSL_HEADER
        - name: X_FRAME_OPTIONS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: X_FRAME_OPTIONS
        - name: SECURE_REFERRER_POLICY
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: SECURE_REFERRER_POLICY
        - name: CSRF_COOKIE_SECURE
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: CSRF_COOKIE_SECURE
        - name: CSRF_TRUSTED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: django-config
              key: CSRF_TRUSTED_ORIGINS
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ht/
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ht/
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: media
          mountPath: /app/media
      volumes:
      - name: logs
        emptyDir: {}
      - name: media
        emptyDir: {}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1