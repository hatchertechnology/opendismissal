apiVersion: v1
kind: Pod
metadata:
  name: {{ include "opendismissal.fullname" . }}-test-connection
  labels:
    {{- include "opendismissal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['sh', '-c', 'wget -qO- {{ include "opendismissal.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never